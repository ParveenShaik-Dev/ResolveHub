trigger:
  branches:
    include:
      - main

pool:
  name: Default

stages:
- stage: Backend
  displayName: 'Build Backend'
  jobs:
  - job: BuildAPI
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'
    - script: dotnet restore "$(Build.SourcesDirectory)/SupportTicket.API/SupportTicket.API.csproj"
      displayName: 'Restore packages'
    - script: dotnet build "$(Build.SourcesDirectory)/SupportTicket.API/SupportTicket.API.csproj" --configuration Release
      displayName: 'Build ASP.NET Core API'
    - script: dotnet publish "$(Build.SourcesDirectory)/SupportTicket.API/SupportTicket.API.csproj" --configuration Release --output $(Build.ArtifactStagingDirectory)/backend
      displayName: 'Publish ASP.NET Core API'
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/backend'
        ArtifactName: 'backend-drop'

- stage: DeployBackend
  displayName: 'Deploy Backend'
  dependsOn: Backend
  jobs:
  - job: Deploy
    steps:
    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'backend-drop'
        downloadPath: '$(System.ArtifactsDirectory)'
    - task: AzureWebApp@1
      inputs:
        azureSubscription: 'AzureServiceConnection'
        appType: 'webApp'
        appName: 'Resolvehub-api'
        package: '$(System.ArtifactsDirectory)/backend-drop'

- stage: Frontend
  displayName: 'Build Frontend'
  dependsOn:
  - DeployBackend
  jobs:
  - job: BuildAngular
    steps:
    - task: NodeTool@1
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'
    - task: CmdLine@2
      displayName: 'Install packages'
      inputs:
        script: npm install
        workingDirectory: '$(Build.SourcesDirectory)/SupportTicket.Angular'
    - task: CmdLine@2
      displayName: 'Build Angular App'
      inputs:
        script: npm run build -- --configuration production
        workingDirectory: '$(Build.SourcesDirectory)/SupportTicket.Angular'
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)/SupportTicket.Angular/dist/ticket-app/browser'
        ArtifactName: 'frontend-drop'

- stage: DeployFrontend
  displayName: 'Deploy Frontend'
  dependsOn:
  - Frontend
  jobs:
  - job: Deploy
    steps:
    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'frontend-drop'
        downloadPath: '$(System.ArtifactsDirectory)'
    - task: CmdLine@2
      displayName: 'Add web.config for Angular routing'
      inputs:
        script: |
          echo ^<?xml version="1.0"?^> > "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<configuration^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<system.webServer^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<rewrite^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<rules^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<rule name="Angular" stopProcessing="true"^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<match url=".*" /^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<conditions logicalGrouping="MatchAll"^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<add input="{REQUEST_FILENAME}" matchType="IsFile" negate="true" /^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<add input="{REQUEST_FILENAME}" matchType="IsDirectory" negate="true" /^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^</conditions^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^<action type="Rewrite" url="/index.html" /^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^</rule^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^</rules^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^</rewrite^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^</system.webServer^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
          echo ^</configuration^> >> "$(System.ArtifactsDirectory)/frontend-drop/web.config"
    - task: AzureWebApp@1
      inputs:
        azureSubscription: 'AzureServiceConnection'
        appType: 'webApp'
        appName: 'resolvehub-angular'
        package: '$(System.ArtifactsDirectory)/frontend-drop'